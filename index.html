<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>判別式ドリル | Standalone</title>

    <!-- iOS Home Screen Icon & Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%235D5FEF'/%3E%3Cpath d='M60 120c15 0 21-8 21-21V80c0-15 8-25 24-23M60 85h40' stroke='white' stroke-width='12' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='140' cy='40' r='15' fill='white' opacity='0.2'/%3E%3C/svg%3E">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />

    <!-- React, ReactDOM, Babel, Framer Motion, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fd;
        margin: 0;
        height: 100dvh;
        overflow: hidden;
      }
      #root {
        height: 100%;
      }
      #loading {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: white; display: flex; justify-content: center; align-items: center;
        z-index: 1000; font-weight: bold; color: #5d5fef;
      }
      .custom-scroll::-webkit-scrollbar { width: 4px; }
      .custom-scroll::-webkit-scrollbar-track { background: transparent; }
      .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div id="loading">読み込み中...</div>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useCallback, useRef } = React;
      const { motion, AnimatePresence } = window.Motion || { motion: ({children}) => <div>{children}</div>, AnimatePresence: ({children}) => <>{children}</> };

      const LucideIcon = ({ name, size = 24, className = "", fill = "none" }) => {
        const icons = {
          functionSquare: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M9 17c2 0 2.8-1 2.8-2.8V10c0-2 1-3.3 3.2-3"/><path d="M9 11.2h5.7"/></svg>,
          star: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>,
          refresh: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>,
          help: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
          chevron: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"></path></svg>,
          trophy: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>,
          binary: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="14" y="14" width="4" height="6" rx="2"></rect><rect x="6" y="4" width="4" height="6" rx="2"></rect><path d="M6 20h4"></path><path d="M14 10h4"></path><path d="M6 14h2v6"></path><path d="M14 4h2v6"></path></svg>,
          arrowLeft: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>,
          smile: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
        };
        return icons[name] || null;
      };

      function generateProblem(canBeNegative = true) {
        const a = (canBeNegative && Math.random() < 0.2) ? -1 : 1;
        const rand = Math.random();
        const targetNature = rand < 0.4 ? 'distinct_real' : (rand < 0.7 ? 'distinct_complex' : 'repeated_real');
        let b = 0, c = 0, d = 0;
        if (targetNature === 'repeated_real') {
          const k = Math.floor(Math.random() * 7) - 3; 
          b = 2 * a * k; c = a * k * k; d = 0;
        } else if (targetNature === 'distinct_real') {
          b = Math.floor(Math.random() * 11) - 5;
          if (a === 1) { const maxC = Math.floor((b * b - 1) / 4); c = maxC - Math.floor(Math.random() * 4); }
          else { const minC = Math.ceil((-b * b + 1) / 4); c = minC + Math.floor(Math.random() * 4); }
          d = b * b - 4 * a * c;
        } else {
          b = Math.floor(Math.random() * 9) - 4;
          if (a === 1) { const minC = Math.ceil((b * b + 1) / 4); c = minC + Math.floor(Math.random() * 4); }
          else { const maxC = Math.floor((-b * b - 1) / 4); c = maxC - Math.floor(Math.random() * 4); }
          d = b * b - 4 * a * c;
        }
        let nature = d === 0 ? 'repeated_real' : (d < 0 ? 'distinct_complex' : 'distinct_real');
        return { a, b, c, discriminant: d, nature };
      }

      function formatEquation(a, b, c) {
        const formatTerm = (val, variable, isFirst = false) => {
          if (val === 0) return '';
          let res = val > 0 && !isFirst ? '+ ' : (val < 0 ? '- ' : '');
          const absVal = Math.abs(val);
          if (absVal !== 1 || variable === '') res += absVal;
          res += variable;
          return res + ' ';
        };
        let str = formatTerm(a, 'x²', true) + formatTerm(b, 'x') + formatTerm(c, '');
        return (str.trim() || '0') + ' = 0';
      }

      const getNatureLabel = (n) => ({ 'distinct_real': '異なる2つの実数解', 'repeated_real': '重解', 'distinct_complex': '異なる2つの虚数解' }[n] || '');
      const formatTime = (ms) => {
        const s = ms / 1000;
        const m = Math.floor(s / 60);
        const r = (s % 60).toFixed(1);
        return m > 0 ? `${m}分${r}秒` : `${r}秒`;
      };

      function App() {
        const [status, setStatus] = useState('start');
        const [problem, setProblem] = useState(null);
        const [score, setScore] = useState(0);
        const [answeredCount, setAnsweredCount] = useState(0);
        const [isCorrect, setIsCorrect] = useState(null);
        const [selectedNature, setSelectedNature] = useState(null);
        const [startTime, setStartTime] = useState(null);
        const [endTime, setEndTime] = useState(null);
        const [mistakes, setMistakes] = useState([]);
        const [negativeACount, setNegativeACount] = useState(0);

        useEffect(() => {
          const l = document.getElementById('loading');
          if (l) l.style.display = 'none';
        }, []);

        const startQuiz = () => {
          const f = generateProblem(true);
          setProblem(f); setScore(0); setAnsweredCount(1); setIsCorrect(null);
          setSelectedNature(null); setNegativeACount(f.a === -1 ? 1 : 0);
          setStartTime(Date.now()); setMistakes([]); setStatus('playing');
        };

        const moveToNext = useCallback(() => {
          if (answeredCount >= 10) { setEndTime(Date.now()); setStatus('result'); }
          else {
            const next = generateProblem(negativeACount < 1);
            if (next.a === -1) setNegativeACount(p => p + 1);
            setProblem(next); setAnsweredCount(p => p + 1);
            setIsCorrect(null); setSelectedNature(null);
          }
        }, [answeredCount, negativeACount]);

        const formatDisc = (a, b, c) => `${b < 0 ? `(${b})` : b}² - 4 × ${a < 0 ? `(${a})` : a} × ${c < 0 ? `(${c})` : c}`;

        const handleAnswer = (nature) => {
          if (isCorrect !== null || !problem) return;
          const correct = nature === problem.nature;
          setIsCorrect(correct); setSelectedNature(nature);
          if (correct) setScore(p => p + 1);
          else setMistakes(p => [...p, { problem, userAnswer: nature, qNum: answeredCount }]);
        };

        return (
          <div className="h-full flex flex-col bg-[#F8F9FD] text-[#4A4A4A] select-none">
            <header className="bg-white/90 backdrop-blur pb-2 pt-4 px-4 flex justify-between items-center shadow-sm shrink-0">
              <div className="flex items-center gap-2">
                <LucideIcon name="functionSquare" size={20} className="text-[#5D5FEF]" />
                <h1 className="font-black text-base tracking-tight">判別式ドリル</h1>
              </div>
              {status !== 'start' && (
                <button onClick={() => setStatus('start')} className="text-[10px] font-black text-zinc-400 hover:text-[#5D5FEF] uppercase tracking-widest flex items-center gap-1">
                  <LucideIcon name="arrowLeft" size={12} /> BACK
                </button>
              )}
            </header>

            <main className="flex-1 flex flex-col items-center justify-center p-4 max-w-2xl mx-auto w-full overflow-hidden">
              <AnimatePresence mode="wait">
                {status === 'start' ? (
                  <motion.div key="start" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, scale: 0.95 }} className="text-center space-y-6">
                    <h2 className="text-5xl md:text-7xl font-black text-zinc-800 leading-tight tracking-tighter">判別式<br /><span className="text-[#5D5FEF]">Training</span></h2>
                    <p className="text-zinc-500 font-bold text-sm md:text-lg">D = b² - 4ac をマスターしよう！<br /><span className="text-zinc-400 text-xs">全１０回 / タイムアタック</span></p>
                    <button onClick={startQuiz} className="px-10 py-5 bg-[#5D5FEF] text-white font-black text-xl rounded-3xl shadow-xl hover:bg-indigo-600 transition-all flex items-center gap-3 mx-auto">
                      START <LucideIcon name="chevron" size={24} />
                    </button>
                  </motion.div>
                ) : status === 'result' ? (
                  <motion.div key="result" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="w-full space-y-4 max-h-full overflow-hidden flex flex-col items-center">
                    <div className="text-center shrink-0">
                      <LucideIcon name="trophy" size={40} className="mx-auto text-amber-400" />
                      <h2 className="text-xl font-black uppercase">Result</h2>
                    </div>
                    <div className="grid grid-cols-2 gap-3 w-full shrink-0">
                      <div className="bg-white p-4 rounded-2xl border border-indigo-50 text-center shadow-sm">
                        <p className="text-[10px] font-bold text-zinc-400 uppercase">Score</p>
                        <p className="text-2xl font-black text-[#5D5FEF]">{score} / 10</p>
                      </div>
                      <div className="bg-white p-4 rounded-2xl border border-indigo-50 text-center shadow-sm">
                        <p className="text-[10px] font-bold text-zinc-400 uppercase">Time</p>
                        <p className="text-2xl font-black text-[#5D5FEF]">{startTime && endTime ? formatTime(endTime - startTime) : '-'}</p>
                      </div>
                    </div>
                    <button onClick={() => setStatus('start')} className="w-full py-4 bg-[#5D5FEF] text-white font-black text-lg rounded-2xl shadow-lg hover:bg-indigo-600 shrink-0 flex items-center justify-center gap-2">
                       <LucideIcon name="refresh" size={20} /> もう一度挑戦
                    </button>
                    {mistakes.length > 0 && (
                      <div className="w-full flex-1 min-h-0 flex flex-col space-y-2">
                        <h3 className="text-center font-black text-rose-500 text-[10px] uppercase tracking-wider shrink-0">Review Mistakes</h3>
                        <div className="flex-1 overflow-y-auto pr-1 space-y-2 custom-scroll pb-2">
                          {mistakes.map((m, i) => (
                            <div key={i} className="bg-white p-2 rounded-xl border border-rose-100 shadow-xs flex justify-between items-center text-[10px]">
                              <div className="space-y-0.5">
                                <p className="text-[8px] font-bold text-zinc-300">No. {m.qNum}</p>
                                <p className="font-black text-zinc-700">{formatEquation(m.problem.a, m.problem.b, m.problem.c)}</p>
                              </div>
                              <div className="text-right">
                                <p className="text-zinc-400">Answer: {getNatureLabel(m.userAnswer)}</p>
                                <p className="text-[#5D5FEF] font-black">Correct: {getNatureLabel(m.problem.nature)}</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </motion.div>
                ) : (
                  <motion.div key={answeredCount} initial={{ opacity: 0, x: 10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -10 }} className="w-full h-full flex flex-col justify-between space-y-4">
                    <div className="flex justify-between items-center shrink-0">
                      <div className="flex items-center gap-2">
                        <div className="bg-[#5D5FEF] text-white text-[8px] font-black px-1.5 py-0.5 rounded uppercase">Progress</div>
                        <span className="text-xs font-black text-zinc-400">{answeredCount} / 10</span>
                      </div>
                      <div className="text-xs font-black text-[#5D5FEF] flex items-center gap-1">
                        <LucideIcon name="star" size={12} fill="currentColor" /> {score} pts
                      </div>
                    </div>

                    <div className="bg-zinc-900 rounded-[1.5rem] p-8 flex items-center justify-center min-h-[140px] shrink-0 shadow-xl">
                      <p className="text-2xl md:text-4xl font-black text-white">{problem && formatEquation(problem.a, problem.b, problem.c)}</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-2 shrink-0">
                      {[{ id: 'distinct_real', l: '2つの実数解' }, { id: 'repeated_real', l: '重解' }, { id: 'distinct_complex', l: '2つの虚数解' }].map(n => (
                        <button key={n.id} onClick={() => handleAnswer(n.id)} disabled={isCorrect !== null} className={`relative p-4 md:p-5 border-2 rounded-2xl text-sm md:text-base font-black transition-all ${isCorrect !== null ? (problem?.nature === n.id ? 'border-rose-400 bg-rose-50 text-rose-600 scale-[0.98]' : (selectedNature === n.id ? 'border-sky-400 bg-sky-50 text-sky-600' : 'border-zinc-100 text-zinc-300 opacity-50')) : 'border-white bg-white shadow-sm hover:border-[#5D5FEF]'}`}>
                          {n.l}
                          {isCorrect !== null && problem?.nature === n.id && <div className="absolute -top-1 -right-1 text-rose-500 text-xl">〇</div>}
                          {isCorrect === false && selectedNature === n.id && <div className="absolute -top-1 -right-1 text-sky-500 text-xl">×</div>}
                        </button>
                      ))}
                    </div>

                    <div className="flex-1 min-h-[160px] relative">
                      <AnimatePresence>
                        {isCorrect !== null && problem && (
                          <motion.div key="exp" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className={`absolute inset-0 p-4 rounded-2xl border-2 flex flex-col justify-between ${isCorrect ? 'bg-rose-50 border-rose-100' : 'bg-sky-50 border-sky-100'}`}>
                            <div className="space-y-1">
                              <h4 className="font-black text-base">{isCorrect ? '正解！' : '解き方をチェック'}</h4>
                              <p className="text-[10px] font-bold text-zinc-500">D = {formatDisc(problem.a, problem.b, problem.c)} = <span className="text-[#5D5FEF] underline">{problem.discriminant}</span></p>
                              <p className="text-xs font-black">D {problem.discriminant > 0 ? '> 0' : (problem.discriminant < 0 ? '< 0' : '= 0')} → {getNatureLabel(problem.nature)}</p>
                            </div>
                            <button onClick={moveToNext} className={`w-full py-3 rounded-xl font-black text-sm shadow-md flex items-center justify-center gap-2 ${isCorrect ? 'bg-rose-500 text-white' : 'bg-sky-500 text-white'}`}>
                                NEXT <LucideIcon name="chevron" size={16} />
                            </button>
                          </motion.div>
                        )}
                        {isCorrect === null && (
                          <motion.div className="absolute inset-0 flex items-end justify-center pb-4">
                            <button onClick={() => { if(confirm("タイトルに戻りますか？")) setStatus('start'); }} className="px-4 py-1.5 border-2 border-zinc-200 text-zinc-300 text-[10px] font-black rounded-full hover:bg-zinc-100">
                                中断する
                            </button>
                          </motion.div>
                        )}
                      </AnimatePresence>
                    </div>
                  </motion.div>
                )}
              </AnimatePresence>
            </main>

            <footer className="py-2 text-center text-[8px] text-zinc-300 font-bold uppercase shrink-0">
              Discriminant Drill v2.5 | Standalone
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
