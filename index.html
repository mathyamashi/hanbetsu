<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>判別式ドリル</title>

    <!-- スタイリッシュな数学アイコン (SVG Data URI) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%235D5FEF'/%3E%3Cpath d='M45 130 C 45 130, 90 30, 135 130' stroke='white' stroke-width='8' fill='none' stroke-linecap='round'/%3E%3Cline x1='90' y1='30' x2='90' y2='150' stroke='rgba(255,255,255,0.3)' stroke-width='4'/%3E%3Ctext x='110' y='70' font-family='Arial, sans-serif' font-weight='bold' font-size='45' fill='white'%3ED%3C/text%3E%3C/svg%3E" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%235D5FEF'/%3E%3Ctext x='10' y='22' font-family='Arial' font-weight='bold' font-size='16' fill='white'%3ED%3C/text%3E%3C/svg%3E" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />

    <!-- React, ReactDOM, Babel, Framer Motion, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fd;
        margin: 0;
        /* モバイルでのバウンススクロールを防止 */
        overscroll-behavior-y: contain;
        overflow: hidden;
      }
      #root {
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        font-weight: bold;
        color: #5d5fef;
      }
      .custom-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="loading">読み込み中...</div>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useCallback, useRef } = React;
      const { motion, AnimatePresence } = window.Motion || { motion: ({children}) => <div>{children}</div>, AnimatePresence: ({children}) => <>{children}</> };

      const LucideIcon = ({ name, size = 24, className = "", fill = "none" }) => {
        const icons = {
          functionSquare: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M9 17c2 0 2.8-1 2.8-2.8V10c0-2 1-3.3 3.2-3"/><path d="M9 11.2h5.7"/></svg>,
          star: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>,
          refresh: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>,
          help: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
          chevron: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"></path></svg>,
          trophy: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>,
          binary: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="14" y="14" width="4" height="6" rx="2"></rect><rect x="6" y="4" width="4" height="6" rx="2"></rect><path d="M6 20h4"></path><path d="M14 10h4"></path><path d="M6 14h2v6"></path><path d="M14 4h2v6"></path></svg>,
          arrowLeft: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>,
          smile: <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
        };
        return icons[name] || null;
      };

      function generateProblem(canBeNegative = true) {
        const a = (canBeNegative && Math.random() < 0.2) ? -1 : 1;
        const rand = Math.random();
        const targetNature = rand < 0.4 ? 'distinct_real' : (rand < 0.7 ? 'distinct_complex' : 'repeated_real');
        
        let b = 0, c = 0, d = 0;
        if (targetNature === 'repeated_real') {
          const k = Math.floor(Math.random() * 7) - 3; 
          b = 2 * a * k;
          c = a * k * k;
        } else if (targetNature === 'distinct_real') {
          b = Math.floor(Math.random() * 11) - 5;
          if (a === 1) {
             const maxC = Math.floor((b * b - 1) / 4);
             c = maxC - Math.floor(Math.random() * 4);
          } else {
             const minC = Math.ceil((-b * b + 1) / 4);
             c = minC + Math.floor(Math.random() * 4);
          }
        } else {
          b = Math.floor(Math.random() * 9) - 4;
          if (a === 1) {
             const minC = Math.ceil((b * b + 1) / 4);
             c = minC + Math.floor(Math.random() * 4);
          } else {
             const maxC = Math.floor((-b * b - 1) / 4);
             c = maxC - Math.floor(Math.random() * 4);
          }
        }
        d = b * b - 4 * a * c;
        let nature = d === 0 ? 'repeated_real' : (d < 0 ? 'distinct_complex' : 'distinct_real');
        return { a, b, c, discriminant: d, nature };
      }

      function formatEquation(a, b, c) {
        const formatTerm = (val, variable, isFirst = false) => {
          if (val === 0) return '';
          let res = val > 0 && !isFirst ? '+ ' : (val < 0 ? '- ' : '');
          const absVal = Math.abs(val);
          if (absVal !== 1 || variable === '') res += absVal;
          res += variable;
          return res + ' ';
        };
        return (formatTerm(a, 'x²', true) + formatTerm(b, 'x') + formatTerm(c, '')).trim() + ' = 0';
      }

      function getNatureLabel(nature) {
        return { 'distinct_real': '異なる2つの実数解', 'repeated_real': '重解', 'distinct_complex': '異なる2つの虚数解' }[nature];
      }

      function App() {
        const [status, setStatus] = useState('start');
        const [problem, setProblem] = useState(null);
        const [score, setScore] = useState(0);
        const [answeredCount, setAnsweredCount] = useState(0);
        const [isCorrect, setIsCorrect] = useState(null);
        const [selectedNature, setSelectedNature] = useState(null);
        const [startTime, setStartTime] = useState(null);
        const [endTime, setEndTime] = useState(null);
        const [mistakes, setMistakes] = useState([]);
        const [negativeACount, setNegativeACount] = useState(0);

        useEffect(() => {
          const loader = document.getElementById('loading');
          if (loader) loader.style.display = 'none';
        }, []);

        const startQuiz = () => {
          const first = generateProblem(true);
          setProblem(first); setScore(0); setAnsweredCount(1);
          setIsCorrect(null); setSelectedNature(null);
          setNegativeACount(first.a === -1 ? 1 : 0);
          setStartTime(Date.now()); setMistakes([]);
          setStatus('playing');
        };

        const moveToNext = useCallback(() => {
          if (answeredCount >= 10) {
            setEndTime(Date.now()); setStatus('result');
          } else {
            const nextProb = generateProblem(negativeACount < 1);
            if (nextProb.a === -1) setNegativeACount(prev => prev + 1);
            setProblem(nextProb); setAnsweredCount(p => p + 1);
            setIsCorrect(null); setSelectedNature(null);
          }
        }, [answeredCount, negativeACount]);

        const handleAnswer = (nature) => {
          if (isCorrect !== null) return;
          const correct = nature === problem.nature;
          setIsCorrect(correct); setSelectedNature(nature);
          if (correct) setScore(p => p + 1);
          else setMistakes(p => [...p, { problem, userAnswer: nature, qNum: answeredCount }]);
        };

        return (
          <div className="flex-1 flex flex-col bg-[#F8F9FD] text-[#4A4A4A] overflow-hidden font-sans">
            <header className="bg-white/80 backdrop-blur-md border-b p-3 flex justify-between items-center z-10 shadow-sm px-4 shrink-0">
              <div className="flex items-center gap-2">
                <LucideIcon name="functionSquare" size={22} className="text-[#5D5FEF]" />
                <h1 className="font-black text-lg tracking-tight text-zinc-800">判別式ドリル</h1>
              </div>
              {status !== 'start' && (
                <button onClick={() => setStatus('start')} className="flex items-center gap-1 text-[10px] font-black text-zinc-400 hover:text-[#5D5FEF] transition-colors uppercase tracking-widest">
                  <LucideIcon name="arrowLeft" size={14} /> Back
                </button>
              )}
            </header>

            <main className="flex-1 flex flex-col items-center justify-start py-4 px-4 max-w-2xl mx-auto w-full overflow-hidden">
              <AnimatePresence mode="wait">
                {status === 'start' ? (
                  <motion.div key="start" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, scale: 0.95 }} className="flex-1 flex flex-col items-center justify-center space-y-6 text-center">
                    <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border-4 border-indigo-50">
                      <LucideIcon name="functionSquare" size={48} className="text-[#5D5FEF] mx-auto mb-4" />
                      <h2 className="text-4xl md:text-6xl font-black text-zinc-800 leading-tight tracking-tighter">
                        判別式<br/><span className="text-[#5D5FEF]">Training</span>
                      </h2>
                    </div>
                    <p className="text-zinc-500 font-bold text-sm md:text-lg max-w-xs">
                      ２次方程式の解の判別式「D = b² - 4ac」をマスターしよう！
                    </p>
                    <button onClick={startQuiz} className="px-10 py-5 bg-[#5D5FEF] text-white font-black text-xl rounded-2xl shadow-xl hover:shadow-2xl hover:bg-indigo-600 transition-all flex items-center gap-3">
                      START <LucideIcon name="chevron" size={24} />
                    </button>
                  </motion.div>
                ) : status === 'result' ? (
                  <motion.div key="result" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex-1 flex flex-col w-full overflow-y-auto custom-scroll space-y-4 py-2">
                    <div className="text-center shrink-0">
                      <LucideIcon name="trophy" size={48} className="mx-auto text-amber-400 mb-1" />
                      <h2 className="text-2xl font-black">Result</h2>
                    </div>
                    <div className="grid grid-cols-2 gap-3 shrink-0">
                      <div className="bg-white p-4 rounded-3xl border border-indigo-50 text-center">
                        <p className="text-zinc-400 font-bold text-[10px] uppercase">Score</p>
                        <p className="text-3xl font-black text-[#5D5FEF]">{score} / 10</p>
                      </div>
                      <div className="bg-white p-4 rounded-3xl border border-indigo-50 text-center">
                        <p className="text-zinc-400 font-bold text-[10px] uppercase">Time</p>
                        <p className="text-2xl md:text-3xl font-black text-[#5D5FEF] whitespace-nowrap">{(startTime && endTime) ? ((endTime-startTime)/1000).toFixed(1)+'秒' : '-'}</p>
                      </div>
                    </div>
                    <button onClick={() => setStatus('start')} className="w-full py-4 bg-[#5D5FEF] text-white font-black rounded-2xl shadow-lg flex items-center justify-center gap-2 shrink-0">
                      <LucideIcon name="refresh" size={20} /> もう一度挑戦
                    </button>
                    {mistakes.length > 0 && (
                      <div className="space-y-2 pt-4 border-t border-zinc-200">
                        <h3 className="text-center font-black text-rose-500 text-[10px] uppercase tracking-wider">Review mistakes</h3>
                        <div className="space-y-2">
                          {mistakes.map((m, i) => (
                            <div key={i} className="bg-white p-3 rounded-xl border border-rose-100 shadow-sm flex flex-col gap-1 text-[11px]">
                              <div className="flex justify-between items-center">
                                <span className="font-black text-zinc-300">No. {m.qNum}</span>
                                <span className="font-black text-zinc-700">{formatEquation(m.problem.a, m.problem.b, m.problem.c)}</span>
                              </div>
                              <div className="text-[10px] bg-zinc-50 p-1.5 rounded-lg text-zinc-500 font-medium">
                                D = ({m.problem.b})² - 4({m.problem.a})({m.problem.c}) = {m.problem.discriminant}
                              </div>
                              <div className="flex justify-between font-black">
                                <span className="text-zinc-400">選: {getNatureLabel(m.userAnswer).slice(0,5)}...</span>
                                <span className="text-rose-500">正解: {getNatureLabel(m.problem.nature)}</span>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </motion.div>
                ) : (
                  <motion.div key={answeredCount} initial={{ opacity: 0, x: 10 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -10 }} className="flex-1 flex flex-col w-full space-y-4">
                    <div className="flex justify-between items-center px-1 shrink-0">
                      <div className="flex items-center gap-2">
                        <div className="bg-[#5D5FEF] text-white text-[10px] font-black px-2 py-0.5 rounded uppercase">Q.{answeredCount}</div>
                        <div className="w-24 h-1.5 bg-zinc-200 rounded-full overflow-hidden">
                          <div className="h-full bg-[#5D5FEF]" style={{ width: `${answeredCount*10}%` }}></div>
                        </div>
                      </div>
                      <div className="text-[11px] font-black text-[#5D5FEF] flex items-center gap-1">
                        <LucideIcon name="star" size={12} fill="currentColor" /> {score} pts
                      </div>
                    </div>

                    <div className="relative bg-zinc-900 rounded-[2rem] p-6 md:p-10 flex items-center justify-center min-h-[120px] md:min-h-[160px] shadow-2xl shrink-0">
                      <p className="text-2xl md:text-4xl font-black tracking-tighter text-white text-center">
                        {problem && formatEquation(problem.a, problem.b, problem.c)}
                      </p>
                    </div>

                    <div className="grid grid-cols-1 gap-2 shrink-0">
                      {['distinct_real', 'repeated_real', 'distinct_complex'].map(id => (
                        <button key={id} onClick={() => handleAnswer(id)} disabled={isCorrect !== null} className={`relative py-3.5 md:py-5 px-4 border-2 md:border-4 rounded-2xl text-sm md:text-lg font-black transition-all ${
                          isCorrect !== null ? (problem?.nature === id ? 'border-rose-400 bg-rose-50 text-rose-600 scale-[0.98]' : (selectedNature === id ? 'border-sky-400 bg-sky-50 text-sky-600' : 'border-zinc-100 text-zinc-300 opacity-50')) : 'border-white bg-white text-zinc-700 shadow-md active:scale-95'
                        }`}>
                          {{'distinct_real':'2つの実数解', 'repeated_real':'重解', 'distinct_complex':'2つの虚数解'}[id]}
                          {isCorrect !== null && problem?.nature === id && <div className="absolute top-1 right-2 text-rose-500 text-2xl opacity-80">〇</div>}
                          {isCorrect === false && selectedNature === id && <div className="absolute top-1 right-2 text-sky-500 text-2xl opacity-80">×</div>}
                        </button>
                      ))}
                    </div>

                    <div className="flex-1 min-h-0 relative">
                      <AnimatePresence mode="wait">
                        {isCorrect !== null && problem ? (
                          <motion.div key="exp" initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className={`p-4 rounded-2xl border flex flex-col h-full bg-white shadow-sm ${isCorrect ? 'border-rose-100' : 'border-sky-100'}`}>
                            <div className="flex-1 flex flex-col justify-center text-center space-y-2">
                                <h4 className={`font-black text-lg ${isCorrect ? 'text-rose-500' : 'text-sky-500'}`}>{isCorrect ? '正解！' : '残念！'}</h4>
                                <div className="text-[12px] md:text-sm font-bold text-zinc-600">
                                  D = ({problem.b})² - 4({problem.a})({problem.c}) = <span className="text-[#5D5FEF]">{problem.discriminant}</span>
                                </div>
                                <div className="font-black text-sm text-zinc-800">
                                  D {problem.discriminant > 0 ? '> 0' : (problem.discriminant < 0 ? '< 0' : '= 0')} → {getNatureLabel(problem.nature)}
                                </div>
                            </div>
                            <button onClick={moveToNext} className={`mt-2 py-3 rounded-xl font-black text-white shadow-lg flex items-center justify-center gap-2 ${isCorrect ? 'bg-rose-500' : 'bg-sky-500'}`}>
                              NEXT <LucideIcon name="chevron" size={18} />
                            </button>
                          </motion.div>
                        ) : (
                          <div className="h-full flex items-center justify-center">
                             <p className="text-[10px] text-zinc-300 font-bold uppercase tracking-widest italic">Choose the correct answer</p>
                          </div>
                        )}
                      </AnimatePresence>
                    </div>
                  </motion.div>
                )}
              </AnimatePresence>
            </main>

            <footer className="p-2 text-center text-[9px] text-zinc-300 font-bold uppercase tracking-widest shrink-0">
               Discriminant Drill v2.5
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
