<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>判別式トレーニング | 2次方程式</title>
    
    <!-- Tailwind CSS (CDN版) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FD; margin: 0; }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 1000; font-weight: bold; color: #5D5FEF;
        }
    </style>
</head>
<body>
    <div id="loading">読み込み中...</div>
    <div id="root"></div>

    <script type="text/babel">
        // --- 独自SVGアイコン (外部ライブラリ不要) ---
        const Icon = ({ name, className="" }) => {
            const icons = {
                zap: <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
                trophy: <svg className={className} width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>,
                refresh: <svg className={className} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
            };
            return icons[name] || null;
        };

        const { useState, useEffect, useCallback, useRef } = React;

        // --- 数学ロジック ---
        function generateProblem() {
            const a = Math.random() < 0.2 ? -1 : 1;
            const rand = Math.random();
            let target;
            if (rand < 0.4) target = 'distinct_real';
            else if (rand < 0.7) target = 'distinct_complex';
            else target = 'repeated_real';

            let b, c, d;
            if (target === 'repeated_real') {
                const k = Math.floor(Math.random() * 7) - 3;
                b = 2 * a * k; c = a * k * k; d = 0;
            } else {
                let attempts = 0;
                while (attempts < 50) {
                    b = Math.floor(Math.random() * 11) - 5;
                    c = Math.floor(Math.random() * 9) - 4;
                    if (b === 0 && c === 0) { attempts++; continue; }
                    d = b * b - 4 * a * c;
                    if (target === 'distinct_real' && d > 0) break;
                    if (target === 'distinct_complex' && d < 0) break;
                    attempts++;
                }
            }
            return { a, b, c, d, nature: d > 0 ? 'distinct_real' : (d < 0 ? 'distinct_complex' : 'repeated_real') };
        }

        function formatEq(a, b, c) {
            const term = (v, x, f) => {
                if (v === 0) return '';
                let s = v > 0 ? (f ? '' : '+ ') : '- ';
                let av = Math.abs(v);
                return s + (av === 1 && x !== '' ? '' : av) + x + ' ';
            };
            return (term(a, 'x²', true) + term(b, 'x', false) + term(c, '', false)).trim() + ' = 0';
        }

        function App() {
            const [status, setStatus] = useState('start');
            const [prob, setProb] = useState(null);
            const [score, setScore] = useState(0);
            const [count, setCount] = useState(0);
            const [isCorrect, setIsCorrect] = useState(null);
            const [marker, setMarker] = useState(null);
            const [mistakes, setMistakes] = useState([]);
            const [startTime, setStartTime] = useState(null);
            const [endTime, setEndTime] = useState(null);

            useEffect(() => {
                const loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
            }, []);

            const start = () => {
                setProb(generateProblem()); setScore(0); setCount(1); setIsCorrect(null);
                setMistakes([]); setStartTime(Date.now()); setStatus('playing');
            };

            const answer = (nature) => {
                if (isCorrect !== null) return;
                const ok = nature === prob.nature;
                setMarker(ok ? '〇' : '×');
                setIsCorrect(ok);
                if (ok) setScore(s => s + 1);
                else setMistakes(m => [...m, { prob, user: nature, n: count }]);

                setTimeout(() => setMarker(null), 800);
                setTimeout(() => {
                    if (count >= 10) {
                        setEndTime(Date.now());
                        setStatus('result');
                    } else {
                        setProb(generateProblem());
                        setCount(c => c + 1);
                        setIsCorrect(null);
                    }
                }, 2000);
            };

            if (status === 'start') return (
                <div className="flex flex-col items-center justify-center min-h-[100vh] p-4 text-center">
                    <h1 className="text-5xl font-black mb-4 text-zinc-800">判別式ドリル</h1>
                    <p className="text-zinc-500 mb-8 font-bold">2次方程式の解の判別を極めよう！<br/>1セット：10問</p>
                    <button onClick={start} className="bg-[#5D5FEF] text-white px-12 py-5 rounded-2xl font-black text-2xl shadow-xl hover:bg-indigo-600 transition-all active:scale-95">
                        スタート！
                    </button>
                </div>
            );

            if (status === 'result') return (
                <div className="max-w-2xl mx-auto p-4 py-8 text-center">
                    <div className="mb-4 flex justify-center"><Icon name="trophy" className="text-amber-400" /></div>
                    <h2 className="text-3xl font-black my-4">トレーニング完了！</h2>
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-white p-6 rounded-2xl border-2 border-indigo-50 shadow-sm">
                            <p className="text-xs text-zinc-400 font-bold uppercase mb-1">正解率</p>
                            <p className="text-3xl font-black text-[#5D5FEF]">{score}/10</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border-2 border-indigo-50 shadow-sm">
                            <p className="text-xs text-zinc-400 font-bold uppercase mb-1">タイム</p>
                            <p className="text-2xl font-black text-[#5D5FEF]">{((endTime - startTime)/1000).toFixed(1)}秒</p>
                        </div>
                    </div>
                    <button onClick={() => setStatus('start')} className="w-full bg-[#5D5FEF] text-white py-4 rounded-xl font-black mb-8 flex items-center justify-center gap-2 shadow-lg">
                        <Icon name="refresh" /> もう一度挑戦する
                    </button>
                    {mistakes.length > 0 && (
                        <div className="text-left space-y-4">
                            <h3 className="font-black text-rose-500 border-b pb-2 text-center">復習リスト</h3>
                            {mistakes.map((m, i) => (
                                <div key={i} className="bg-white p-4 rounded-xl border-2 border-rose-100 shadow-sm flex flex-col md:flex-row items-center gap-4">
                                    <div className="flex-1 font-black text-lg">{formatEq(m.prob.a, m.prob.b, m.prob.c)}</div>
                                    <div className="flex-1 text-xs text-zinc-500 bg-zinc-50 p-2 rounded text-center">D = {m.prob.d}</div>
                                    <div className="text-xs font-black text-rose-500">正解: {m.prob.nature === 'repeated_real' ? '重解' : (m.prob.d > 0 ? '実数解' : '虚数解')}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            return (
                <div className="max-w-2xl mx-auto p-4 flex flex-col min-h-[100vh]">
                    <div className="flex justify-between items-center mb-6 py-4">
                        <span className="font-black text-lg text-[#5D5FEF]">Q {count} / 10</span>
                        <div className="font-black text-zinc-400 flex items-center gap-1"><Icon name="zap" className="text-amber-400" /> Score: {score}</div>
                    </div>
                    <div className="bg-white border-2 border-indigo-50 rounded-3xl p-10 md:p-16 text-center mb-10 relative flex items-center justify-center min-h-[150px] shadow-sm">
                        <p className="text-3xl md:text-5xl font-black tracking-tighter text-zinc-800">{prob && formatEq(prob.a, prob.b, prob.c)}</p>
                        {marker && <div className={`absolute text-[200px] font-black pointer-events-none opacity-80 ${marker === '〇' ? 'text-rose-400' : 'text-emerald-400'}`}>{marker}</div>}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-10">
                        {['distinct_real', 'repeated_real', 'distinct_complex'].map(n => (
                            <button key={n} onClick={() => answer(n)} disabled={isCorrect !== null} className={`p-6 rounded-2xl border-2 font-black transition-all active:scale-95 ${isCorrect !== null ? (prob.nature === n ? 'border-rose-400 bg-rose-50 text-rose-500' : (n === nature ? 'border-emerald-400 bg-emerald-50' : 'bg-zinc-50 opacity-50')) : 'border-white bg-white shadow-sm hover:border-indigo-200'}`}>
                                {n === 'distinct_real' ? '2つの実数解' : (n === 'repeated_real' ? '重解' : '2つの虚数解')}
                            </button>
                        ))}
                    </div>
                    {isCorrect !== null && (
                        <div className={`p-5 rounded-2xl border-2 animate-bounce-in ${isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}`}>
                            <p className="font-black mb-1">{isCorrect ? '🎉 正解！' : '📚 おさらい'}</p>
                            <p className="text-sm font-bold opacity-80">D = ({prob.b})² - 4({prob.a})({prob.c}) = {prob.d} です。</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
